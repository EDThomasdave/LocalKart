<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Store Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-2xl font-bold mb-6">Store Manager</h1>

<!-- ADD PRODUCT -->
<div class="bg-white p-4 rounded shadow mb-6">
  <h2 class="font-bold mb-3">Add Product</h2>

<input id="name" type="text" placeholder="Product Name">
<input id="price" type="number" placeholder="Price">
<input id="image" type="file">
<select id="tags" class="border p-2 rounded">
  <option value="">Select Category</option>
  <option value="milk">Milk</option>
  <option value="bread">Bread & Pav</option>
  <option value="eggs">Eggs</option>
  <option value="cereals">Kellogg’s & Cereals</option>
  <option value="muesli">Muesli & Granola</option>
  <option value="daily">Everyday Items</option>
</select>

<button onclick="addProduct()">Add Product</button>


</div>

<div class="bg-white p-4 rounded shadow mt-6">
  <h2 class="font-bold mb-3 text-lg">Orders</h2>
  <div id="orderList" class="space-y-3"></div>
</div>

<!-- PRODUCT LIST -->
<div class="bg-white p-4 rounded shadow">
  <h2 class="font-bold mb-3">Your Products</h2>

  <div id="productList"></div>
</div>

<script>

async function loadOrders() {
  if (!STORE_ID) return; // 🔥 prevent crash

  const res = await fetch(
    `https://localkart-backend-hbou.onrender.com/api/order/store/${STORE_ID}`
  );

  const orders = await res.json();

  const container = document.getElementById("orderList");
  container.innerHTML = "";

  if (!orders || orders.length === 0) {
    container.innerHTML = "<p class='text-gray-400'>No orders yet</p>";
    return;
  }

  orders.reverse().forEach(o => {
    container.innerHTML += `
      <div class="border rounded-lg p-3 shadow-sm bg-gray-50">

        <div class="flex justify-between">
          <p class="font-bold text-sm">Order #${o._id.slice(-5)}</p>
          <span class="text-xs px-2 py-1 rounded 
            ${o.status === "pending" ? "bg-yellow-200" :
              o.status === "fulfilled" ? "bg-blue-200" :
              "bg-green-200"}">
            ${o.status}
          </span>
        </div>

        <ul class="text-sm mt-2">
          ${o.items.map(i => `<li>• ${i.name} x${i.quantity}</li>`).join("")}
        </ul>

        <p class="font-bold mt-2">Total: ₹${o.total}</p>

        ${
          o.status === "pending"
            ? `<button onclick="fulfillOrder('${o._id}')"
                class="bg-green-500 text-white px-3 py-1 rounded mt-2 text-sm">
                Mark Fulfilled
              </button>`
            : ""
        }

      </div>
    `;
  });
}

async function fulfillOrder(orderId) {
  await fetch(
    `https://localkart-backend-hbou.onrender.com/api/order/fulfill/${orderId}`,
    { method: "PUT" }
  );

  loadOrders();
}

const store = JSON.parse(localStorage.getItem("store"));

if (!store) {
  alert("Login required");
  window.location.href = "store-login.html";
}

// 🔥 LOAD PRODUCTS
async function loadProducts() {
  const res = await fetch(`https://localkart-backend-hbou.onrender.com/api/products`);
  const products = await res.json();

  const myProducts = products.filter(
  p => p.store === store.id || p.store?._id === store.id
);

  const container = document.getElementById("productList");
  container.innerHTML = "";

  myProducts.forEach(p => {
  container.innerHTML += `
    <div class="border p-3 mb-2 flex justify-between items-center">
      <div class="flex gap-3 items-center">
        <img src="https://localkart-backend-hbou.onrender.com${p.image}" width="50">

        <div>
          <p class="font-bold">${p.name}</p>
          <p>₹${p.price}</p>
        </div>
      </div>

      <button onclick="deleteProduct('${p._id}')" class="bg-red-500 text-white px-3 py-1 rounded">
        Delete
      </button>
    </div>
  `;
});
}

// ➕ ADD PRODUCT
async function addProduct() {
  const nameInput = document.getElementById("name");
  const priceInput = document.getElementById("price");
  const imageInput = document.getElementById("image");

  // 🔥 safety checks
  if (!nameInput || !priceInput || !imageInput) {
    alert("Input fields missing ❌");
    return;
  }

  const name = nameInput.value;
  const price = priceInput.value;
  const image = imageInput.files[0];

  if (!name || !price || !image) {
    alert("Fill all fields ❌");
    return;
  }

  const formData = new FormData();
  formData.append("name", name);
  formData.append("price", price);
  formData.append("image", image);
  const tag = document.getElementById("tags").value;

if (!tag) {
  alert("Please select a category ❌");
  return;
}

formData.append("tags", tag);

  // 🔥 get store from localStorage
  const store = JSON.parse(localStorage.getItem("store"));
  formData.append("store", store.id);

  try {
    const res = await fetch("https://localkart-backend-hbou.onrender.com/api/products", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    console.log(data);

    if (!res.ok) {
      alert("❌ Failed to add product");
      return;
    }

    alert("✅ Product added successfully");
    loadProducts(); // 🔥 ADD THIS

  } catch (err) {
    console.log(err);
    alert("Server error ❌");
  }
}

// ❌ DELETE PRODUCT
async function deleteProduct(id) {
  await fetch(`https://localkart-backend-hbou.onrender.com/api/products/${id}`, {
    method: "DELETE"
  });

  alert("Deleted");
  loadProducts();
}

loadProducts();


</script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js">
</script>
<script>
const socket = io("https://localkart-backend-hbou.onrender.com");

const storeData = JSON.parse(localStorage.getItem("store"));
const STORE_ID = storeData?.id;

if (STORE_ID) {
  socket.emit("joinStore", STORE_ID);
  console.log("Joined store socket:", STORE_ID);
}

socket.on("new-order", (order) => {
  console.log("New order received:", order);

  // refresh orders instantly
  loadOrders();

  // popup
  const notif = document.createElement("div");
  notif.innerText = "🛒 New Order!";
  notif.className = "fixed top-5 right-5 bg-green-500 text-white px-4 py-2 rounded";

  document.body.appendChild(notif);
  setTimeout(() => notif.remove(), 3000);
});

if (STORE_ID) {
  socket.emit("joinStore", STORE_ID);
  console.log("Joined store socket:", STORE_ID);

  loadOrders(); // 🔥 load AFTER store is ready
}
</script>

</body>
</html>
