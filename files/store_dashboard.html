<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Store Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-2xl font-bold mb-6">Store Manager</h1>

<!-- ADD PRODUCT -->
<div class="bg-white p-4 rounded shadow mb-6">
  <h2 class="font-bold mb-3">Add Product</h2>

<input id="name" type="text" placeholder="Product Name">
<input id="price" type="number" placeholder="Price">
<input id="image" type="file">
<select id="tags" class="border p-2 rounded">
  <option value="">Select Category</option>
  <option value="milk">Milk</option>
  <option value="bread">Bread & Pav</option>
  <option value="eggs">Eggs</option>
  <option value="cereals">Kellogg’s & Cereals</option>
  <option value="muesli">Muesli & Granola</option>
  <option value="daily">Everyday Items</option>
</select>

<button onclick="addProduct()">Add Product</button>


</div>

<!-- PRODUCT LIST -->
<div class="bg-white p-4 rounded shadow">
  <h2 class="font-bold mb-3">Your Products</h2>

  <div id="productList"></div>
</div>

<script>
const store = JSON.parse(localStorage.getItem("store"));

if (!store) {
  alert("Login required");
  window.location.href = "store-login.html";
}

// 🔥 LOAD PRODUCTS
async function loadProducts() {
  const res = await fetch(`https://localkart-backend-hbou.onrender.com/api/products`);
  const products = await res.json();

  const myProducts = products.filter(
  p => p.store === store.id || p.store?._id === store.id
);

  const container = document.getElementById("productList");
  container.innerHTML = "";

  myProducts.forEach(p => {
  container.innerHTML += `
    <div class="border p-3 mb-2 flex justify-between items-center">
      <div class="flex gap-3 items-center">
        <img src="https://localkart-backend-hbou.onrender.com${p.image}" width="50">

        <div>
          <p class="font-bold">${p.name}</p>
          <p>₹${p.price}</p>
        </div>
      </div>

      <button onclick="deleteProduct('${p._id}')" class="bg-red-500 text-white px-3 py-1 rounded">
        Delete
      </button>
    </div>
  `;
});
}

// ➕ ADD PRODUCT
async function addProduct() {
  const nameInput = document.getElementById("name");
  const priceInput = document.getElementById("price");
  const imageInput = document.getElementById("image");

  // 🔥 safety checks
  if (!nameInput || !priceInput || !imageInput) {
    alert("Input fields missing ❌");
    return;
  }

  const name = nameInput.value;
  const price = priceInput.value;
  const image = imageInput.files[0];

  if (!name || !price || !image) {
    alert("Fill all fields ❌");
    return;
  }

  const formData = new FormData();
  formData.append("name", name);
  formData.append("price", price);
  formData.append("image", image);
  const tag = document.getElementById("tags").value;

if (!tag) {
  alert("Please select a category ❌");
  return;
}

formData.append("tags", tag);

  // 🔥 get store from localStorage
  const store = JSON.parse(localStorage.getItem("store"));
  formData.append("store", store.id);

  try {
    const res = await fetch("https://localkart-backend-hbou.onrender.com/api/products", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    console.log(data);

    if (!res.ok) {
      alert("❌ Failed to add product");
      return;
    }

    alert("✅ Product added successfully");
    loadProducts(); // 🔥 ADD THIS

  } catch (err) {
    console.log(err);
    alert("Server error ❌");
  }
}

// ❌ DELETE PRODUCT
async function deleteProduct(id) {
  await fetch(`https://localkart-backend-hbou.onrender.com/api/products/${id}`, {
    method: "DELETE"
  });

  alert("Deleted");
  loadProducts();
}

loadProducts();

// 🔔 SOCKET CONNECTION
const socket = io("https://localkart-backend-hbou.onrender.com");

// get store from localStorage
const storeData = JSON.parse(localStorage.getItem("store"));
const STORE_ID = storeData?.id;

// join store room
if (STORE_ID) {
  socket.emit("joinStore", STORE_ID);
  console.log("Joined store socket:", STORE_ID);
}

// listen for new orders
socket.on("newOrder", (data) => {
  console.log("NEW ORDER:", data);

  // 🔥 simple UI
  const notif = document.createElement("div");
  notif.innerText = "🛒 New Order Received!";
  notif.className = "fixed top-5 right-5 bg-green-500 text-white px-4 py-2 rounded shadow-lg";

  document.body.appendChild(notif);

  setTimeout(() => notif.remove(), 4000);
});
</script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js">
</script>

</body>
</html>
