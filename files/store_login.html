<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalKart – Store Login</title>
  <link rel="icon" type="png" href="/media/localkart_circilar_icon.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      background: #f8f9fa;
      font-family: "Bricolage Grotesque", sans-serif;
    }

    .circle-top-left {
      position: absolute;
      width: 280px;
      height: 280px;
      top: -120px;
      left: -120px;
      background: #166534;
      border-radius: 50%;
      opacity: 0.15;
      z-index: -1;
    }

    .circle-bottom-right {
      position: fixed;
      width: 300px;
      height: 300px;
      bottom: -140px;
      right: -140px;
      background: #166534;
      border-radius: 50%;
      opacity: 0.15;
      z-index: -1;
    }

    .login-box {
      max-width: 500px;
      margin: 120px auto;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .btn-login {
      width: 100%;
      background: #166534;
      color: white;
      padding: 12px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 10px;
      border: none;
    }

    .btn-login:hover {
      background: #0f3f20;
    }
  </style>
</head>

<body>

<div class="circle-top-left"></div>
<div class="circle-bottom-right"></div>

<div class="login-box">

  <h2 class="text-center mb-4" style="color:#166534; font-weight:800;">
    Store Login
  </h2>

  <form onsubmit="loginStore(event)">

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input id="email" type="email" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input id="password" type="password" class="form-control" required>
    </div>

    <button class="btn-login">Login</button>

  </form>

  <div class="text-center mt-3">
    <a href="for_stores.html">New Store? Register here</a>
  </div>

</div>

<script>
async function loginStore(e) {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("http://localhost:5000/api/store/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.msg);
    return;
  }

  // ✅ save store session
  localStorage.setItem("store", JSON.stringify(data.store));

  alert("Login successful 🚀");

  // 👉 go to dashboard
  window.location.href = "store-dashboard.html";
}
</script>

</body>
</html>
