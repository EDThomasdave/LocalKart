<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everyday Items</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { font-family: 'Inter', sans-serif; background-color: #a5b39c; }
</style>
</head>

<body class="m-0 p-0 overflow-hidden">

<!-- HEADER -->
<header class="bg-[#f0f2f1] px-8 py-2 flex items-center justify-between border-b">

    <div class="flex items-center gap-10">
        <div class="flex items-center gap-1">
            <div class="bg-[#24963f] text-white rounded-full w-9 h-9 flex items-center justify-center font-bold text-xl">L</div>
            <span class="text-2xl font-extrabold">LocalKart</span>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="flex-1 max-w-xl mx-10">
        <div class="relative">
            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input id="searchBox" type="text" placeholder="Search items..." 
            class="w-full bg-white border rounded-lg py-2 pl-10 pr-4 text-sm">
        </div>
    </div>

    <!-- CART -->
    <div class="flex items-center gap-6">
        <button class="bg-white border px-4 py-2 rounded-lg">
            🛒 My Cart (<span id="cartCount">0</span>)
        </button>
    </div>

</header>

<!-- MAIN -->
<main class="flex h-[calc(100vh-110px)] mx-8 mt-3 bg-white rounded-xl overflow-hidden">

<!-- SIDEBAR -->
<aside class="w-20 border-r border-gray-100 flex flex-col items-center bg-white overflow-y-auto">

    <!-- Milk -->
    <a href="./dashboard.html" class="flex flex-col items-center py-5 opacity-60 hover:opacity-100 w-full">
        <img src="https://cdn-icons-png.flaticon.com/128/372/372971.png" class="w-7">
        <span class="text-[9px] mt-2 uppercase">Milk</span>
    </a>

    <!-- Bread -->
    <a href="./breadandpav.html" class="flex flex-col items-center py-5 opacity-60 hover:opacity-100 w-full">
        <img src="https://cdn-icons-png.flaticon.com/128/3014/3014535.png" class="w-7">
        <span class="text-[9px] mt-2 text-center">Bread & Pav</span>
    </a>

    <!-- Eggs -->
    <a href="./eggs.html" class="flex flex-col items-center py-5 opacity-60 hover:opacity-100 w-full">
        <img src="https://cdn-icons-png.flaticon.com/128/837/837160.png" class="w-7">
        <span class="text-[9px] mt-2 uppercase">Eggs</span>
    </a>

    <!-- Kelloggs -->
    <a href="./kelloggs.html" class="flex flex-col items-center py-5 opacity-60 hover:opacity-100 w-full">
        <img src="https://cdn-icons-png.flaticon.com/128/2913/2913959.png" class="w-7">
        <span class="text-[9px] mt-2 text-center">Kellogg's</span>
    </a>

    <!-- Muesli -->
    <a href="./muesli.html" class="flex flex-col items-center py-5 opacity-60 hover:opacity-100 w-full">
        <img src="https://cdn-icons-png.flaticon.com/128/3014/3014488.png" class="w-7">
        <span class="text-[9px] mt-2 text-center">Muesli</span>
    </a>

    <!-- ✅ ACTIVE Everyday -->
    <div class="w-full flex items-center">
    <div class="w-1 bg-[#24963f] h-12"></div>
    <div class="flex-1 flex flex-col items-center py-4 bg-[#f4fdf6]">
        <img src="https://cdn-icons-png.flaticon.com/128/1046/1046857.png" class="w-7">
        <span class="text-[9px] font-bold mt-2 text-center">Everyday</span>
    </div>
</div>

</aside>


<!-- PRODUCTS -->
<section class="flex-1 p-5 overflow-y-auto">

<h2 class="font-extrabold mb-5">Everyday Items</h2>

<div id="productGrid" class="grid grid-cols-6 gap-3">

<!-- PRODUCT -->
<script>
const products = [
    {id:"e1", name:"Rice", price:120, dist:2,img:"./../media/product-images/Everyday-Items/Rice.png"},
    {id:"e2", name:"Oil", price:150, dist:5,img:"./../media/product-images/Everyday-Items/Oil.png"},
    {id:"e3", name:"Sugar", price:45, dist:9,img:"./../media/product-images/Everyday-Items/Sugar.png"},
    {id:"e4", name:"Salt", price:20, dist:1,img:"./../media/product-images/Everyday-Items/Salt.png"},
    {id:"e5", name:"Soap", price:60, dist:4,img:"./../media/product-images/Everyday-Items/Soap.png"},
    {id:"e6", name:"Toothpaste", price:95, dist:6,img:"./../media/product-images/Everyday-Items/Toothpaste.png"},
    {id:"e7", name:"Detergent", price:110, dist:3,img:"./../media/product-images/Everyday-Items/Detergent.png"},
    {id:"e8", name:"Tea Powder", price:180, dist:7,img:"./../media/product-images/Everyday-Items/Tea Powder.png"}
];

const grid = document.getElementById("productGrid");

products.forEach(p => {

let color = "text-green-600";
if(p.dist > 2 && p.dist <= 8) color = "text-yellow-500";
if(p.dist > 8) color = "text-red-500";

grid.innerHTML += `
<div class="border rounded-xl p-3">
 <img src="${p.img}" class="h-20 mx-auto mb-2 object-contain">

<div class="text-[10px] font-bold ${color}">${p.dist} km away</div>

<h3 class="text-xs font-bold">${p.name}</h3>

<div class="flex justify-between mt-3">
<span>₹${p.price}</span>

<div id="cart-${p.id}">
<button onclick="addToCart('${p.id}')" 
class="bg-[#8cc63f] text-white px-3 py-1 text-xs rounded">
ADD
</button>
</div>

</div>
</div>
`;
});
</script>

</div>
</section>
</main>

<!-- VIEW CART BAR -->
<a href="./cart.html">
<div class="fixed bottom-0 left-0 right-0 bg-[#24963f] text-white text-center py-2 font-bold">
View Cart →
</div>
</a>

<script>
// USER
const user = JSON.parse(localStorage.getItem("user"));
const USER_ID = user?.id;

// ADD TO CART (backend)
async function addToCart(productId){

await fetch("https://localkart-backend-hbou.onrender.com/api/cart/add",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({userId:USER_ID, productId})
});

updateCartCount();
}

// CART COUNT
async function updateCartCount(){
const res = await fetch(`https://localkart-backend-hbou.onrender.com/api/cart/${USER_ID}`);
const data = await res.json();

let total = 0;
data.items?.forEach(i=> total += i.quantity);

document.getElementById("cartCount").innerText = total;
}

updateCartCount();

// SEARCH FILTER
document.getElementById("searchBox").addEventListener("input", function(){
let val = this.value.toLowerCase();
document.querySelectorAll("#productGrid > div").forEach(card=>{
card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none";
});
});
</script>

</body>
</html>
