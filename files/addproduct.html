<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LocalKart Store Manager</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Inter', sans-serif; background-color: #a5b39c; }
</style>
</head>

<body class="m-0 p-0">

<!-- HEADER -->
<header class="bg-[#f0f2f1] px-8 py-3 flex items-center justify-between border-b">

    <!-- LOGO -->
    <div class="flex items-center gap-2">
        <div class="bg-[#24963f] text-white w-9 h-9 flex items-center justify-center rounded-full font-bold">L</div>
        <span class="text-xl font-extrabold">LocalKart</span>
    </div>

    <!-- CART -->
    <div class="bg-white border px-4 py-2 rounded-lg flex items-center gap-2 shadow">
        🛒 Cart
    </div>

</header>

<!-- MAIN -->
<main class="flex gap-6 p-6">

    <!-- LEFT PANEL -->
    <div class="w-[350px] bg-white p-5 rounded-xl shadow">

        <h2 class="font-bold text-lg mb-3">Store Details</h2>

        <input id="shopName" placeholder="Store Name" class="w-full border p-2 mb-2 rounded">
        <input id="shopAddress" placeholder="Store Address" class="w-full border p-2 mb-4 rounded">

        <h2 class="font-bold text-lg mb-3">Add Product</h2>

        <input id="pname" placeholder="Product Name" class="w-full border p-2 mb-2 rounded">
        <input id="pprice" type="number" placeholder="Price" class="w-full border p-2 mb-2 rounded">
        <select id="pcategory" class="w-full border p-2 mb-2 rounded">
    <option value="Dairy">Dairy</option>
    <option value="Bread & Bakery">Bread & Bakery</option>
    <option value="Eggs">Eggs</option>
    <option value="Cereals">Cereals</option>
    <option value="Fruits & Vegetables">Fruits & Vegetables</option>
    <option value="Clothing & Fashion">Clothing & Fashion</option>
</select>
        <input id="pqty" type="number" placeholder="Quantity Available" class="w-full border p-2 mb-2 rounded">
        <input id="pdist" type="number" placeholder="Distance (km)" class="w-full border p-2 mb-2 rounded">

        <!-- IMAGE -->
        <input id="pimage" type="file" accept="image/*" class="w-full border p-2 mb-2 rounded">
        <img id="preview" class="h-20 mx-auto mb-3 hidden">
        <span class="text-[10px] bg-gray-100 px-2 py-1 rounded font-bold">
    ${category}
</span>

        <button onclick="addProduct()" 
        class="bg-[#24963f] text-white w-full py-2 rounded font-bold">
        Add Product
        </button>

    </div>

    <!-- RIGHT PANEL -->
    <div class="flex-1 bg-white p-5 rounded-xl shadow">

        <h2 class="text-lg font-bold mb-5">Your Products</h2>

        <div id="productList" class="grid grid-cols-4 gap-4"></div>

    </div>

</main>

<!-- SCRIPT -->
<script>

let uploadedImage = "";

// IMAGE PREVIEW
document.getElementById("pimage").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(event) {
        uploadedImage = event.target.result;

        let preview = document.getElementById("preview");
        preview.src = uploadedImage;
        preview.classList.remove("hidden");
    };

    reader.readAsDataURL(file);
});

// ADD PRODUCT
function addProduct() {

    let name = document.getElementById("pname").value;
    let price = document.getElementById("pprice").value;
    let qty = document.getElementById("pqty").value;
    let category = document.getElementById("pcategory").value;
    let dist = document.getElementById("pdist").value;
    let shop = document.getElementById("shopName").value;
    let address = document.getElementById("shopAddress").value;

    if (!name || !price || !qty || !dist || !shop) {
        alert("Fill all fields");
        return;
    }

    let color = "text-green-600";
    if (dist > 2 && dist <= 8) color = "text-yellow-500";
    if (dist > 8) color = "text-red-500";

    let imageSrc = uploadedImage || "https://via.placeholder.com/100";

    let card = document.createElement("div");
    card.className = "border rounded-xl p-3 hover:shadow-md";


card.innerHTML = `
    <div class="h-24 flex items-center justify-center mb-2">
        <img src="${imageSrc}" class="h-20 object-contain">
    </div>

    <span class="text-[10px] bg-gray-100 px-2 py-1 rounded font-bold mb-1 inline-block">
        ${category}
    </span>

    <div class="text-[10px] font-bold ${color}">${dist} km away</div>

    <h3 class="text-sm font-bold">${name}</h3>
    <p class="text-xs text-gray-400">${shop}</p>
    <p class="text-xs text-gray-400">${address}</p>

    <p class="text-xs mt-1">Stock: ${qty}</p>

    <div class="flex justify-between mt-3">
        <span class="font-bold">₹${price}</span>
        <button class="bg-[#8cc63f] text-white px-3 py-1 text-xs rounded">ADD</button>
    </div>
`;
    

    document.getElementById("productList").appendChild(card);

    // clear inputs
    document.getElementById("pname").value = "";
    document.getElementById("pprice").value = "";
    document.getElementById("pqty").value = "";
    document.getElementById("pdist").value = "";
    document.getElementById("pimage").value = "";
    document.getElementById("preview").classList.add("hidden");

    uploadedImage = "";
}

</script>

</body>
</html>
