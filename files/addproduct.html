<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LocalKart Vendor Panel</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Inter', sans-serif; background-color: #a5b39c; }
</style>
</head>

<body class="m-0 p-0">

<!-- HEADER -->
<header class="bg-[#f0f2f1] px-8 py-2 flex items-center justify-between border-b border-gray-200">

    <div class="flex items-center gap-3">
        <div class="bg-[#24963f] text-white rounded-full w-9 h-9 flex items-center justify-center font-bold text-xl">L</div>
        <span class="text-2xl font-extrabold">LocalKart</span>
    </div>

    <div class="flex-1 max-w-xl mx-10">
        <input type="text" placeholder="Search products..." 
        class="w-full bg-white border border-gray-200 rounded-lg py-2 px-4 text-sm">
    </div>

    <a href="../index.html" class="text-sm font-bold text-[#24963f]">← Back</a>

</header>

<!-- MAIN -->
<main class="flex gap-6 p-6">

    <!-- LEFT FORM -->
    <div class="w-[350px] bg-white p-5 rounded-xl shadow">

        <h2 class="font-extrabold mb-4 text-lg">Vendor Details</h2>

        <input id="shopName" placeholder="Shop Name" class="w-full border p-2 mb-2 rounded">
        <input id="shopAddress" placeholder="Shop Address" class="w-full border p-2 mb-4 rounded">

        <h2 class="font-extrabold mb-3 text-lg">Add Product</h2>

        <input id="pname" placeholder="Product Name" class="w-full border p-2 mb-2 rounded">
        <input id="pprice" type="number" placeholder="Price" class="w-full border p-2 mb-2 rounded">
        <input id="pdist" type="number" placeholder="Distance (km)" class="w-full border p-2 mb-2 rounded">

        <select id="pcat" class="w-full border p-2 mb-4 rounded">
            <option value="Milk">Milk</option>
            <option value="Bread">Bread & Pav</option>
            <option value="Eggs">Eggs</option>
            <option value="Cereal">Cereals</option>
        </select>

        <button onclick="addProduct()" 
        class="bg-[#24963f] text-white px-4 py-2 rounded w-full font-bold">
        Add Product
        </button>

    </div>

    <!-- RIGHT PRODUCT PREVIEW -->
    <div class="flex-1 bg-white p-5 rounded-xl shadow">

        <h2 class="text-lg font-extrabold mb-5">Your Products</h2>

        <div id="productList" class="grid grid-cols-4 gap-4"></div>

    </div>

</main>

<!-- SCRIPT -->
<script>
function addProduct() {

    let name = document.getElementById("pname").value;
    let price = document.getElementById("pprice").value;
    let dist = document.getElementById("pdist").value;
    let shop = document.getElementById("shopName").value;
    let address = document.getElementById("shopAddress").value;

    if (!name || !price || !dist || !shop) {
        alert("Fill all fields");
        return;
    }

    let color = "text-green-600";
    if (dist > 2 && dist <= 8) color = "text-yellow-500";
    if (dist > 8) color = "text-red-500";

    let card = document.createElement("div");
    card.className = "border border-gray-100 rounded-xl p-3";

    card.innerHTML = `
        <div class="h-24 flex items-center justify-center mb-2">
            <img src="https://via.placeholder.com/100" class="h-20">
        </div>

        <div class="text-[10px] font-bold ${color}">${dist} km away</div>

        <h3 class="text-sm font-bold">${name}</h3>
        <p class="text-xs text-gray-400">${shop}</p>
        <p class="text-xs text-gray-400">${address}</p>

        <div class="flex justify-between mt-3">
            <span class="font-bold">₹${price}</span>
            <button class="bg-[#8cc63f] text-white px-3 py-1 text-xs rounded">ADD</button>
        </div>
    `;

    document.getElementById("productList").appendChild(card);

    // clear inputs
    document.getElementById("pname").value = "";
    document.getElementById("pprice").value = "";
    document.getElementById("pdist").value = "";
}
</script>

</body>
</html>
